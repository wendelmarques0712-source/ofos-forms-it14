<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Oswald:wght@700&display=swap');

  :root {
    --ofos-orange: #f29100;
    --bg-dark: #1a1a1a;
    --bg-input: #2b2b2b;
    --border-input: #3d3d3d;
    --text-white: #ffffff;
    --text-grey: #b3b3b3;
    --font-title: 'Oswald', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }

  /* Container do Formulário Compacto */
  .ofos-dark-form {
    background-color: var(--bg-dark);
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 24px;
    border-radius: 8px;
    box-sizing: border-box;
    font-family: var(--font-body);
    color: var(--text-white);
  }

  .ofos-dark-form *, .ofos-dark-form *::before, .ofos-dark-form *::after {
    box-sizing: border-box;
  }

  /* Cabeçalho */
  .form-eyebrow {
    font-family: var(--font-title);
    font-size: 12px;
    color: var(--ofos-orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
  }

  .form-header h2 {
    font-family: var(--font-title);
    font-size: 28px; 
    font-weight: 700;
    color: var(--text-white);
    text-transform: uppercase;
    line-height: 1.1;
    margin: 0 0 8px 0;
  }

  .form-header p {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px; 
    color: var(--text-grey);
    margin: 0 0 16px 0;
  }

  /* Barra de Progresso com 4 Passos */
  .progress-container {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background-color: #333333; 
    border-radius: 2px;
    transition: background-color 0.3s ease;
  }

  .progress-bar.active {
    background-color: var(--ofos-orange); 
  }

  /* Indicador de Passo */
  .step-title {
    font-family: var(--font-title);
    font-size: 14px;
    color: var(--ofos-orange);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
    letter-spacing: 0.5px;
  }

  /* Inputs e Selects Menores */
  .form-group {
    margin-bottom: 12px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    height: 44px; 
    background-color: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 0 14px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px; 
    color: var(--text-white);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    appearance: none; 
  }

  .form-group input::placeholder {
    color: var(--text-grey);
    font-weight: 500;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--ofos-orange);
  }

  /* Remove o fundo branco do Autofill do Google Chrome */
  .form-group input:-webkit-autofill,
  .form-group input:-webkit-autofill:hover, 
  .form-group input:-webkit-autofill:focus, 
  .form-group input:-webkit-autofill:active{
    -webkit-box-shadow: 0 0 0 30px var(--bg-input) inset !important;
    -webkit-text-fill-color: var(--text-white) !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  /* Customização do Select */
  .form-group select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
    padding-right: 40px;
    cursor: pointer;
  }

  .form-group select option {
    background-color: var(--bg-dark);
    color: var(--text-white);
  }

  /* Botão Laranja */
  .btn-submit {
    width: 100%;
    height: 48px;
    background-color: var(--ofos-orange);
    color: var(--text-white);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 16px;
    border: none;
    border-radius: 99px;
    cursor: pointer;
    margin-top: 4px;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  .btn-submit:hover:not(:disabled) {
    background-color: #d98200;
    transform: translateY(-2px);
  }

  .btn-submit:disabled {
    background-color: #666666;
    cursor: not-allowed;
    transform: none;
  }

  /* Link de Voltar */
  .btn-back {
    display: block;
    width: fit-content;
    margin: 12px auto 0;
    background-color: transparent;
    color: var(--text-grey);
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .btn-back:hover {
    color: var(--text-white);
  }

  /* Controle de Etapas */
  .step-content {
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .step-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsividade */
  @media (max-width: 480px) {
    .ofos-dark-form {
      padding: 20px;
    }
    .form-header h2 {
      font-size: 24px;
    }
  }
</style>

<div class="ofos-dark-form">
  <div class="form-header">
    <span class="form-eyebrow">OFOS SOLUÇÕES CONTRA INCÊNDIO</span>
    <h2>SOLICITE UM<br>DIAGNÓSTICO<br>TÉCNICO GRATUITO</h2>
    <p>Resposta imediata.</p>
    
    <div class="progress-container">
      <div class="progress-bar active" id="pb-1"></div>
      <div class="progress-bar" id="pb-2"></div>
      <div class="progress-bar" id="pb-3"></div>
      <div class="progress-bar" id="pb-4"></div>
    </div>
  </div>

  <form id="form-diagnostico" onsubmit="enviarFormulario(event)">
    
    <div class="step-content active" id="step-1">
      <span class="step-title">PASSO 1 DE 4:</span>
      
      <div class="form-group">
        <input type="text" id="nome" placeholder="Nome:" required>
      </div>
      <div class="form-group">
        <input type="text" id="empresa" placeholder="Empresa:" required>
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(2)">Continuar</button>
    </div>

    <div class="step-content" id="step-2">
      <span class="step-title">PASSO 2 DE 4:</span>
      
      <div class="form-group">
        <input type="text" id="cargo" placeholder="Cargo:" required>
      </div>
      <div class="form-group">
        <input type="tel" id="whatsapp" placeholder="WhatsApp:" required oninput="mascaraWhatsApp(this)" maxlength="13">
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(3)">Continuar</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(1)">← Voltar</button>
    </div>

    <div class="step-content" id="step-3">
      <span class="step-title">PASSO 3 DE 4:</span>
      
      <div class="form-group">
        <select id="tipo-edificacao" required>
          <option value="" disabled selected>Tipo de Edificação:</option>
          <option value="Galpão / Logístico">Galpão / Logístico</option>
          <option value="Indústria">Indústria</option>
          <option value="Comercial / Corporativo">Comercial / Corporativo</option>
          <option value="Saúde / Hospital">Saúde / Hospital</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(4)">Continuar</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(2)">← Voltar</button>
    </div>

    <div class="step-content" id="step-4">
      <span class="step-title">PASSO 4 DE 4:</span>
      
      <div class="form-group">
        <select id="area-imovel" required>
          <option value="" disabled selected>Área Aproximada do Imóvel:</option>
          <option value="Até 5.000 m²">Até 5.000 m²</option>
          <option value="5.000 a 10.000 m²">5.000 a 10.000 m²</option>
          <option value="10.000 a 30.000 m²">10.000 a 30.000 m²</option>
          <option value="Acima de 30.000 m²">Acima de 30.000 m²</option>
        </select>
      </div>

      <button type="submit" class="btn-submit" id="btn-enviar">Solicitar Diagnóstico</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(3)">← Voltar</button>
    </div>

  </form>
</div>

<script>
  // Função para capturar TODOS os parâmetros UTM da URL (incluindo utm_id)
  function capturarUTMs() {
    const params = new URLSearchParams(window.location.search);
    const utms = {
      utm_source: params.get('utm_source') || '',
      utm_medium: params.get('utm_medium') || '',
      utm_campaign: params.get('utm_campaign') || '',
      utm_content: params.get('utm_content') || '',
      utm_term: params.get('utm_term') || '',
      utm_id: params.get('utm_id') || ''
    };
    
    console.log('🔍 UTMs Capturados:', utms);
    return utms;
  }

  // Máscara Robusta para o WhatsApp (Formato: 11 98352-9960)
  function mascaraWhatsApp(input) {
    let v = input.value.replace(/\D/g, "");
    v = v.substring(0, 11);

    if (v.length > 2 && v.length <= 7) {
      v = v.replace(/^(\d{2})(\d+)/, "$1 $2");
    } else if (v.length > 7) {
      v = v.replace(/^(\d{2})(\d{5})(\d+)/, "$1 $2-$3");
    }
    
    input.value = v;
  }

  // Função unificada para avançar as etapas
  function irParaPasso(passoDestino) {
    if (passoDestino === 2) {
      const nome = document.getElementById('nome').value;
      const empresa = document.getElementById('empresa').value;
      if (!nome || !empresa) {
        alert("Por favor, preencha todos os campos antes de continuar.");
        return;
      }
    }
    if (passoDestino === 3) {
      const cargo = document.getElementById('cargo').value;
      const whatsappNumeros = document.getElementById('whatsapp').value.replace(/\D/g, "");
      
      if (!cargo || whatsappNumeros.length < 10) {
        alert("Por favor, preencha o cargo e um número de WhatsApp válido.");
        return;
      }
    }
    if (passoDestino === 4) {
      const tipo = document.getElementById('tipo-edificacao').value;
      if (!tipo) {
        alert("Por favor, selecione o tipo de edificação.");
        return;
      }
    }

    document.querySelector('.step-content.active').classList.remove('active');
    document.getElementById(`step-${passoDestino}`).classList.add('active');
    document.getElementById(`pb-${passoDestino}`).classList.add('active');
  }

  // Função unificada para voltar etapas
  function voltarParaPasso(passoDestino) {
    const passoAtual = passoDestino + 1;
    
    document.querySelector('.step-content.active').classList.remove('active');
    document.getElementById(`step-${passoDestino}`).classList.add('active');
    document.getElementById(`pb-${passoAtual}`).classList.remove('active');
  }

  // Método 1: Fetch com CORS (Primário)
  async function enviarViaFetch(webhookURL, dadosFormulario) {
    try {
      console.log('📤 Tentando enviar via FETCH...');
      
      const response = await fetch(webhookURL, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify(dadosFormulario)
      });

      console.log('✅ Fetch respondeu com status:', response.status);
      
      if (!response.ok) {
        console.warn('⚠️ Status HTTP não OK:', response.status);
      }

      const responseText = await response.text();
      if (responseText) {
        console.log('📝 Resposta do webhook:', responseText);
      }

      return { sucesso: true, metodo: 'fetch', status: response.status };
    } catch (error) {
      console.error('❌ ERRO no Fetch:', error.message);
      return { sucesso: false, metodo: 'fetch', erro: error.message };
    }
  }

  // Método 2: Fallback com Beacon API (Funciona mesmo que CORS bloqueie)
  function enviarViaBeacon(webhookURL, dadosFormulario) {
    try {
      console.log('📤 Tentando enviar via BEACON (fallback para CORS)...');
      
      const blob = new Blob([JSON.stringify(dadosFormulario)], { type: 'application/json' });
      const sucesso = navigator.sendBeacon(webhookURL, blob);
      
      if (sucesso) {
        console.log('✅ Beacon enviado com sucesso');
        return { sucesso: true, metodo: 'beacon' };
      } else {
        console.log('⚠️ Beacon retornou false');
        return { sucesso: false, metodo: 'beacon', erro: 'sendBeacon retornou false' };
      }
    } catch (error) {
      console.error('❌ ERRO no Beacon:', error.message);
      return { sucesso: false, metodo: 'beacon', erro: error.message };
    }
  }

  // Envio final com múltiplos métodos de fallback
  async function enviarFormulario(event) {
    event.preventDefault(); 

    const area = document.getElementById('area-imovel').value;

    if (!area) {
      alert("Por favor, selecione a área aproximada.");
      return;
    }

    const btnEnviar = document.getElementById('btn-enviar');
    btnEnviar.disabled = true;
    btnEnviar.textContent = 'Enviando...';

    const utms = capturarUTMs();

    const dadosFormulario = {
      nome: document.getElementById('nome').value,
      empresa: document.getElementById('empresa').value,
      cargo: document.getElementById('cargo').value,
      whatsapp: document.getElementById('whatsapp').value,
      tipoEdificacao: document.getElementById('tipo-edificacao').value,
      areaImovel: area,
      dataEnvio: new Date().toLocaleString('pt-BR'),
      timestamp: new Date().toISOString(),
      utm_source: utms.utm_source,
      utm_medium: utms.utm_medium,
      utm_campaign: utms.utm_campaign,
      utm_content: utms.utm_content,
      utm_term: utms.utm_term,
      utm_id: utms.utm_id,
      url_origem: window.location.href,
      origem_formulario: 'Vercel-formsofos-ppci'
    };

    console.log('📊 DADOS DO FORMULÁRIO:', dadosFormulario);

    const webhookURL = "https://hook.us1.make.celonis.com/7uelgmvl76k099wcolt5idp4nx1mcc6x";

    // Tenta Fetch primeiro
    let resultado = await enviarViaFetch(webhookURL, dadosFormulario);

    // Se Fetch falhar, tenta Beacon como fallback
    if (!resultado.sucesso) {
      console.log('🔄 Fetch falhou, tentando Beacon...');
      resultado = enviarViaBeacon(webhookURL, dadosFormulario);
    }

    console.log('📈 Resultado final:', resultado);

    // Redireciona em qualquer caso (sucesso ou erro)
    setTimeout(() => {
      window.top.location.href = "https://lp2.ofos.com.br/obrigado-pelo-cadastro-lp2";
    }, 1500);
  }

  // Log de inicialização
  console.log('🚀 Formulário OFOS iniciado - Versão Vercel com Fallback Beacon');
  console.log('📍 URL da página:', window.location.href);
  console.log('🔗 Webhook:', 'https://hook.us1.make.celonis.com/7uelgmvl76k099wcolt5idp4nx1mcc6x');
</script>
