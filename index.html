<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Oswald:wght@700&display=swap');

  :root {
    --ofos-orange: #f29100;
    --bg-dark: #1a1a1a;
    --bg-input: #2b2b2b;
    --border-input: #3d3d3d;
    --text-white: #ffffff;
    --text-grey: #b3b3b3;
    --font-title: 'Oswald', sans-serif;
    --font-body: 'Montserrat', sans-serif;
  }

  /* Container do Formulário Compacto */
  .ofos-dark-form {
    background-color: var(--bg-dark);
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 24px;
    border-radius: 8px;
    box-sizing: border-box;
    font-family: var(--font-body);
    color: var(--text-white);
  }

  .ofos-dark-form *, .ofos-dark-form *::before, .ofos-dark-form *::after {
    box-sizing: border-box;
  }

  /* Cabeçalho */
  .form-eyebrow {
    font-family: var(--font-title);
    font-size: 12px;
    color: var(--ofos-orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
  }

  .form-header h2 {
    font-family: var(--font-title);
    font-size: 28px; 
    font-weight: 700;
    color: var(--text-white);
    text-transform: uppercase;
    line-height: 1.1;
    margin: 0 0 8px 0;
  }

  .form-header p {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px; 
    color: var(--text-grey);
    margin: 0 0 16px 0;
  }

  /* Barra de Progresso com 5 Passos */
  .progress-container {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background-color: #333333; 
    border-radius: 2px;
    transition: background-color 0.3s ease;
  }

  .progress-bar.active {
    background-color: var(--ofos-orange); 
  }

  /* Indicador de Passo */
  .step-title {
    font-family: var(--font-title);
    font-size: 14px;
    color: var(--ofos-orange);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
    letter-spacing: 0.5px;
  }

  /* Inputs e Selects Menores */
  .form-group {
    margin-bottom: 12px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    height: 44px; 
    background-color: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 0 14px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px; 
    color: var(--text-white);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    appearance: none; 
  }

  .form-group input::placeholder {
    color: var(--text-grey);
    font-weight: 500;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--ofos-orange);
  }

  /* Remove o fundo branco do Autofill do Google Chrome */
  .form-group input:-webkit-autofill,
  .form-group input:-webkit-autofill:hover, 
  .form-group input:-webkit-autofill:focus, 
  .form-group input:-webkit-autofill:active{
    -webkit-box-shadow: 0 0 0 30px var(--bg-input) inset !important;
    -webkit-text-fill-color: var(--text-white) !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  /* Customização do Select */
  .form-group select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
    padding-right: 40px;
    cursor: pointer;
  }

  .form-group select option {
    background-color: var(--bg-dark);
    color: var(--text-white);
  }

  /* Estilização dos Checkboxes (Novo Passo) */
  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    background-color: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: var(--text-white);
    transition: border-color 0.2s ease;
  }

  .checkbox-label:hover {
    border-color: var(--text-grey);
  }

  .checkbox-label input {
    display: none;
  }

  .custom-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-input);
    border-radius: 4px;
    margin-right: 10px;
    display: inline-block;
    position: relative;
    background-color: transparent;
    flex-shrink: 0;
  }

  .checkbox-label input:checked + .custom-checkbox {
    background-color: var(--ofos-orange);
    border-color: var(--ofos-orange);
  }

  .checkbox-label input:checked + .custom-checkbox::after {
    content: '';
    position: absolute;
    left: 5px;
    top: 2px;
    width: 4px;
    height: 8px;
    border: solid var(--text-white);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  /* Borda laranja se marcado */
  .checkbox-label:has(input:checked) {
    border-color: var(--ofos-orange);
  }

  /* Botão Laranja */
  .btn-submit {
    width: 100%;
    height: 48px;
    background-color: var(--ofos-orange);
    color: var(--text-white);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 16px;
    border: none;
    border-radius: 99px;
    cursor: pointer;
    margin-top: 4px;
    transition: background-color 0.2s ease, transform 0.2s ease;
  }

  .btn-submit:hover {
    background-color: #d98200;
    transform: translateY(-2px);
  }

  .btn-submit:disabled {
    background-color: #666666;
    cursor: not-allowed;
    transform: none;
  }

  /* Link de Voltar */
  .btn-back {
    display: block;
    width: fit-content;
    margin: 12px auto 0;
    background-color: transparent;
    color: var(--text-grey);
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 13px;
    border: none;
    cursor: pointer;
    text-decoration: underline;
  }

  .btn-back:hover {
    color: var(--text-white);
  }

  /* Controle de Etapas */
  .step-content {
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .step-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsividade */
  @media (max-width: 480px) {
    .ofos-dark-form {
      padding: 20px;
    }
    .form-header h2 {
      font-size: 24px;
    }
    .checkbox-grid {
      grid-template-columns: 1fr; /* Em telas muito pequenas empilha as opções */
    }
  }
</style>

<div class="ofos-dark-form">
  <div class="form-header">
    <span class="form-eyebrow">OFOS SOLUÇÕES CONTRA INCÊNDIO</span>
    <h2>SOLICITE UM<br>DIAGNÓSTICO<br>TÉCNICO GRATUITO</h2>
    <p>Resposta imediata.</p>
    
    <div class="progress-container">
      <div class="progress-bar active" id="pb-1"></div>
      <div class="progress-bar" id="pb-2"></div>
      <div class="progress-bar" id="pb-3"></div>
      <div class="progress-bar" id="pb-4"></div>
      <div class="progress-bar" id="pb-5"></div>
    </div>
  </div>

  <form id="form-diagnostico" onsubmit="enviarFormulario(event)">
    
    <div class="step-content active" id="step-1">
      <span class="step-title">PASSO 1 DE 5:</span>
      
      <div class="form-group">
        <input type="text" id="nome" placeholder="Nome:" required>
      </div>
      <div class="form-group">
        <input type="text" id="empresa" placeholder="Empresa:" required>
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(2)">Continuar</button>
    </div>

    <div class="step-content" id="step-2">
      <span class="step-title">PASSO 2 DE 5:</span>
      
      <div class="form-group">
        <input type="text" id="cargo" placeholder="Cargo:" required>
      </div>
      <div class="form-group">
        <input type="tel" id="whatsapp" placeholder="WhatsApp:" required oninput="mascaraWhatsApp(this)" maxlength="13">
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(3)">Continuar</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(1)">← Voltar</button>
    </div>

    <div class="step-content" id="step-3">
      <span class="step-title">PASSO 3 DE 5:</span>
      
      <div class="form-group">
        <select id="tipo-edificacao" required>
          <option value="" disabled selected>Tipo de Edificação:</option>
          <option value="Galpão / Logístico">Galpão / Logístico</option>
          <option value="Indústria">Indústria</option>
          <option value="Comercial / Corporativo">Comercial / Corporativo</option>
          <option value="Saúde / Hospital">Saúde / Hospital</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(4)">Continuar</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(2)">← Voltar</button>
    </div>

    <div class="step-content" id="step-4">
      <span class="step-title">PASSO 4 DE 5:</span>
      
      <div class="form-group">
        <select id="area-imovel" required>
          <option value="" disabled selected>Área Aproximada do Imóvel:</option>
          <option value="Até 5.000 m²">Até 5.000 m²</option>
          <option value="5.000 a 10.000 m²">5.000 a 10.000 m²</option>
          <option value="10.000 a 30.000 m²">10.000 a 30.000 m²</option>
          <option value="Acima de 30.000 m²">Acima de 30.000 m²</option>
        </select>
      </div>

      <button type="button" class="btn-submit" onclick="irParaPasso(5)">Continuar</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(3)">← Voltar</button>
    </div>

    <div class="step-content" id="step-5">
      <span class="step-title">PASSO 5 DE 5:</span>
      
      <span style="font-family: var(--font-title); font-size: 15px; color: var(--text-white); margin-bottom: 12px; display: block; letter-spacing: 0.5px;">SISTEMA A INSTALAR / ADEQUAR</span>
      
      <div class="checkbox-grid">
        <label class="checkbox-label">
          <input type="checkbox" name="sistema" value="Sprinkler">
          <span class="custom-checkbox"></span>
          SPRINKLER
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="sistema" value="Hidrante">
          <span class="custom-checkbox"></span>
          HIDRANTE
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="sistema" value="Alarme de Incêndio">
          <span class="custom-checkbox"></span>
          ALARME DE INCÊNDIO
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="sistema" value="Outro">
          <span class="custom-checkbox"></span>
          OUTRO
        </label>
      </div>

      <button type="submit" class="btn-submit" id="btn-enviar">Solicitar Diagnóstico</button>
      <button type="button" class="btn-back" onclick="voltarParaPasso(4)">← Voltar</button>
    </div>

  </form>
</div>

<script>
  // user_id persistente (identifica o navegador entre sessões)
  function getUserId() {
    var key = 'ofos_user_id';
    var id = localStorage.getItem(key);
    if (!id) {
      id = 'u_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
      localStorage.setItem(key, id);
    }
    return id;
  }

  // Captura todos os parâmetros de tracking da URL (injetados pelo iframe embed da LP)
  function capturarTracking() {
    const p = new URLSearchParams(window.location.search);
    return {
      utm_source:   p.get('utm_source')   || '',
      utm_medium:   p.get('utm_medium')   || '',
      utm_campaign: p.get('utm_campaign') || '',
      utm_content:  p.get('utm_content')  || '',
      utm_term:     p.get('utm_term')     || '',
      gclid:        p.get('gclid')        || '',
      fbclid:       p.get('fbclid')       || '',
      fbp:          p.get('fbp')          || '',
      fbc:          p.get('fbc')          || '',
      event_id:     p.get('event_id')     || '',
      page_url:     p.get('page_url')     || document.referrer || '',
      user_agent:   p.get('user_agent')   || navigator.userAgent || '',
      user_id:      getUserId()
    };
  }

  // Máscara Robusta para o WhatsApp (Formato: 11 98352-9960)
  function mascaraWhatsApp(input) {
    // Pega apenas os números
    let v = input.value.replace(/\D/g, "");
    
    // Limita a 11 números no total
    v = v.substring(0, 11);

    // Formata conforme o usuário digita ou usa preenchimento automático
    if (v.length > 2 && v.length <= 7) {
      v = v.replace(/^(\d{2})(\d+)/, "$1 $2"); // Coloca o espaço após o DDD
    } else if (v.length > 7) {
      v = v.replace(/^(\d{2})(\d{5})(\d+)/, "$1 $2-$3"); // Coloca o espaço e o hífen
    }
    
    input.value = v;
  }

  // Função unificada para avançar as etapas
  function irParaPasso(passoDestino) {
    if (passoDestino === 2) {
      const nome = document.getElementById('nome').value;
      const empresa = document.getElementById('empresa').value;
      if (!nome || !empresa) {
        alert("Por favor, preencha todos os campos antes de continuar.");
        return;
      }
    }
    if (passoDestino === 3) {
      const cargo = document.getElementById('cargo').value;
      
      // Validação Flexível: Verifica se a quantidade MÍNIMA de NÚMEROS foi preenchida
      // Pega o valor e remove os espaços e hífens para contar só os números puros
      const whatsappNumeros = document.getElementById('whatsapp').value.replace(/\D/g, "");
      
      if (!cargo || whatsappNumeros.length < 10) {
        alert("Por favor, preencha o cargo e um número de WhatsApp válido.");
        return;
      }
    }
    if (passoDestino === 4) {
      const tipo = document.getElementById('tipo-edificacao').value;
      if (!tipo) {
        alert("Por favor, selecione o tipo de edificação.");
        return;
      }
    }
    if (passoDestino === 5) {
      const area = document.getElementById('area-imovel').value;
      if (!area) {
        alert("Por favor, selecione a área aproximada.");
        return;
      }
    }

    // Esconde a atual e mostra a próxima
    document.querySelector('.step-content.active').classList.remove('active');
    document.getElementById(`step-${passoDestino}`).classList.add('active');
    
    // Atualiza a barra de progresso
    document.getElementById(`pb-${passoDestino}`).classList.add('active');
  }

  // Função unificada para voltar etapas
  function voltarParaPasso(passoDestino) {
    const passoAtual = passoDestino + 1;
    
    // Esconde a atual e mostra a anterior
    document.querySelector('.step-content.active').classList.remove('active');
    document.getElementById(`step-${passoDestino}`).classList.add('active');
    
    // Remove a cor laranja da barrinha que foi desfeita
    document.getElementById(`pb-${passoAtual}`).classList.remove('active');
  }

  // Envio final com webhook e redirecionamento
  function enviarFormulario(event) {
    event.preventDefault(); 

    // Captura os sistemas marcados
    const checkboxes = document.querySelectorAll('input[name="sistema"]:checked');
    const sistemasSelecionados = Array.from(checkboxes).map(cb => cb.value).join(', ');

    if (!sistemasSelecionados) {
      alert("Por favor, selecione pelo menos um sistema a instalar ou adequar.");
      return;
    }

    // Desabilita o botão durante o envio
    const btnEnviar = document.getElementById('btn-enviar');
    btnEnviar.disabled = true;
    btnEnviar.textContent = 'Enviando...';

    // Captura todos os parâmetros de tracking
    const tracking = capturarTracking();

    // Coleta todos os dados do formulário + tracking completo
    const dadosFormulario = {
      nome:           document.getElementById('nome').value,
      empresa:        document.getElementById('empresa').value,
      cargo:          document.getElementById('cargo').value,
      whatsapp:       document.getElementById('whatsapp').value,
      tipoEdificacao: document.getElementById('tipo-edificacao').value,
      areaImovel:     document.getElementById('area-imovel').value,
      sistemas:       sistemasSelecionados, // NOVA INFO ENVIADA PARA O WEBHOOK
      dataEnvio:      new Date().toLocaleString('pt-BR'),
      timestamp:      new Date().toISOString(),
      utm_source:     tracking.utm_source,
      utm_medium:     tracking.utm_medium,
      utm_campaign:   tracking.utm_campaign,
      utm_content:    tracking.utm_content,
      utm_term:       tracking.utm_term,
      gclid:          tracking.gclid,
      fbclid:         tracking.fbclid,
      fbp:            tracking.fbp,
      fbc:            tracking.fbc,
      event_id:       tracking.event_id,
      page_url:       tracking.page_url,
      user_agent:     tracking.user_agent,
      user_id:        tracking.user_id
    };

    // Proxy serverless — webhook nunca exposto no cliente
    fetch('/api/submit', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(dadosFormulario)
    })
    .then(response => {
      console.log('Resposta do webhook:', response.status);
      // Redireciona após sucesso (aguarda 1 segundo)
      setTimeout(() => {
        window.top.location.href = "https://lp2.ofos.com.br/obrigado-pelo-cadastro-lp2";
      }, 1000);
    })
    .catch(error => {
      console.error('Erro ao enviar dados:', error);
      // Redireciona mesmo com erro para não deixar o usuário travado
      setTimeout(() => {
        window.top.location.href = "https://lp2.ofos.com.br/obrigado-pelo-cadastro-lp2";
      }, 1000);
    });
  }
</script>
